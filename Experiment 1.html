<html>
<body>
<title>
Registration form
</title>
<h1 style="color:red;text-align:center">Student Registration form</h1>
<br>
<form>
<label>Full Name:<input type="text"></label>
</form>
<br>
<form>
<label>Email Address:<input type="text"></label>
</form>
<br>
<br<br>
<form>
<label>Password:<input type="password"></label>
</form>
<br>
<br>
<form>
<label for="dob">Date of Birth:</label><br>
<input type="date" id="dob" name="dob" required>
<form>
<br>
<label>Gender:</label><br>
<input type="radio" name="gender" id="male">
<label for="male">Male</label>
<input type="radio"name="gender" id="female">
<label for ="female">Female</label>
</form>
<form>
<br>
<br>
<label>Courses:</label><br>
<input type="checkbox" name="courses" value="CSE">CSE
<input type="checkbox" name="courses" value="ECE">ECE
<input type="checkbox" name="courses" value="EEE">EEE
<input type="checkbox" name="courses" value="MECH">MECH
</form>
<form>
<select<label for="country">Country:</label><br>
<select id="country" name="country" required>
    <option value="">--Select Country--</option>
    <option value="india">India</option>
    <option value="usa">United States</option>
    <option value="uk">United Kingdom</option>
    <option value="canada">Canada</option>
    <option value="australia">Australia</option>
    <option value="japan">Japan</option>
    <option value="germany">Germany</option>
    <option value="france">France</option>
    <option value="china">China</option>
    <option value="singapore">Singapore</option>
</select>
<form>
<br>
<br>
<br>
<label for="address">Adress:</label>
<textarea rows="3"cols="30" name="address" id="address"></textarea>
</form>
<br>
<br>
<form>
<button type="submit">Submit</button>
<button type="reset">Reset</button>
</form>
</body>
</html>
